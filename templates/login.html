<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>

<body>

    <h1>Login Form</h1>

    <p style="color:red;">{{ message }}</p>

    <form method="POST">

        <label>Email:</label>
        <input title="email" type="email" id="email" name="email"><br><br>

        <label>Password:</label>
        <input title="password" type="password" id="password" name="password"><br><br>

        <button type="submit">Login</button>

    </form>

</body>

</html>
